version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - durationcheck
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - recvcheck
    - staticcheck
    - unconvert
    - unused
    - wastedassign
  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
